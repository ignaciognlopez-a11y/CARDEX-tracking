<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cardex — Portfolio</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Montserrat:wght@800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #000000;
      --surface: rgba(22,22,22,0.94);
      --surface2: rgba(30,30,30,0.94);
      --border: rgba(212,168,58,0.32);
      --border-subtle: rgba(255,255,255,0.05);
      --gold: #b8912e;
      --gold-dim: #6b5218;
      --orange: #b8912e;
      --text: #f2f2f2;
      --text-muted: #9a9a9a;
      --green: #3ddc84; --green-bg: rgba(61,220,132,0.10);
      --red: #ff5a5a; --red-bg: rgba(255,90,90,0.10);
      --radius: 12px;
      --card-glow: 0 0 0 1px rgba(212,168,58,0.38), inset 0 1px 0 rgba(255,255,255,0.16), 0 3px 0 rgba(0,0,0,0.9), 0 10px 28px rgba(0,0,0,0.85), 0 28px 64px rgba(0,0,0,0.9), 0 0 90px rgba(212,168,58,0.18);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: radial-gradient(ellipse 140% 100% at 50% 35%, #3a2e14 0%, #241c0c 18%, #150f07 38%, #0a0703 62%, #000000 100%) fixed; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; min-height: 100vh; padding-bottom: 60px; overflow-x: hidden; }

    @keyframes slide-in-left  { from { opacity:0; transform:translateX(-48px); } to { opacity:1; transform:translateX(0); } }
    @keyframes slide-out-left { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(-48px); } }
    main { animation: slide-in-left 0.3s cubic-bezier(0.25,0.46,0.45,0.94) both; }
    main.leaving { animation: slide-out-left 0.22s cubic-bezier(0.55,0,1,0.45) both; }

    /* HEADER */
    header { position:fixed; top:0; left:0; right:0; z-index:50; background:rgba(3,3,3,0.85); backdrop-filter:blur(24px) saturate(1.4); border-bottom:1px solid rgba(184,145,46,0.24); padding:12px 28px; display:flex; align-items:center; gap:14px; }
    .logo-text { font-family:'Montserrat',sans-serif; font-weight:800; font-size:22px; letter-spacing:0.02em; background:linear-gradient(135deg,#e8c766,#b8912e 55%,#8a6d1a); -webkit-background-clip:text; background-clip:text; color:transparent; line-height:1; }
    nav { display:flex; gap:4px; margin-left:20px; }
    .nav-link { font-size:13px; font-weight:500; color:var(--text-muted); text-decoration:none; padding:5px 12px; border-radius:6px; transition:background 0.15s,color 0.15s; }
    .nav-link:hover, .nav-link.active { background:var(--surface2); color:var(--text); }
    .updated { margin-left:auto; font-size:11px; color:var(--text-muted); }

    main { padding:22px 28px; padding-top:calc(22px + 55px); }

    /* SUMMARY */
    .summary-box { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px; }
    .summary-metric { background:rgba(20,20,20,0.85); border:1px solid rgba(184,145,46,0.32); border-radius:var(--radius); padding:16px 20px; display:flex; flex-direction:column; gap:4px; backdrop-filter:blur(20px); box-shadow:0 6px 28px rgba(0,0,0,0.55),0 0 0 1px rgba(255,255,255,0.04),inset 0 1px 0 rgba(255,255,255,0.07); }
    .sm-label { font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:rgba(255,255,255,0.75); font-weight:700; }
    .sm-value { font-family:'DM Sans',sans-serif; font-size:26px; font-weight:800; letter-spacing:-0.8px; line-height:1.1; color:var(--text); }
    .sm-value.pos { color:var(--green); } .sm-value.neg { color:var(--red); }
    .sm-sub { font-size:11px; color:rgba(255,255,255,0.4); font-weight:500; }
    .sm-sub.pos { color:var(--green); } .sm-sub.neg { color:var(--red); } .sm-sub.pos, .sm-sub.neg { font-weight:600; }

    /* P&L metric clickable */
    .summary-metric.clickable { cursor:pointer; transition:border-color 0.2s, background 0.2s, box-shadow 0.2s; }
    .summary-metric.clickable:hover { border-color:rgba(184,145,46,0.56); background:rgba(20,20,20,0.85); box-shadow:0 4px 24px rgba(0,0,0,0.5),0 0 20px rgba(184,145,46,0.16),inset 0 1px 0 rgba(255,255,255,0.07); }

    /* P&L BREAKDOWN MODAL */
    .pnl-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.82); backdrop-filter:blur(12px); z-index:200; align-items:center; justify-content:center; }
    .pnl-overlay.open { display:flex; animation:overlay-in 0.18s ease both; }
    @keyframes overlay-in { from{opacity:0} to{opacity:1} }
    .pnl-modal { background:rgba(10,10,10,0.96); border:1px solid rgba(184,145,46,0.29); border-radius:16px; width:460px; max-width:95vw; max-height:80vh; display:flex; flex-direction:column; box-shadow:0 32px 80px rgba(0,0,0,0.9),0 0 0 1px rgba(184,145,46,0.13); animation:pnl-in 0.25s cubic-bezier(0.34,1.4,0.64,1) both; backdrop-filter:blur(24px); }
    @keyframes pnl-in { from{opacity:0;transform:scale(0.9) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }
    .pnl-header { padding:16px 20px 12px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); flex-shrink:0; }
    .pnl-title { font-size:15px; font-weight:800; letter-spacing:-0.3px; }
    .pnl-totals { display:flex; gap:16px; align-items:baseline; }
    .pnl-total-val { font-size:22px; font-weight:800; letter-spacing:-0.5px; }
    .pnl-total-pct { font-size:12px; font-weight:700; }
    .pnl-close { width:26px; height:26px; border-radius:50%; background:rgba(20,20,20,0.9); border:1px solid rgba(184,145,46,0.24); cursor:pointer; color:var(--text-muted); font-size:13px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .pnl-list { overflow-y:auto; padding:8px 0; }
    .pnl-row { display:flex; align-items:center; gap:10px; padding:8px 20px; transition:background 0.1s; }
    .pnl-row:hover { background:rgba(20,20,20,0.85); }
    .pnl-rank { font-size:10px; color:var(--text-muted); width:16px; text-align:right; flex-shrink:0; }
    .pnl-img { width:32px; height:32px; border-radius:4px; object-fit:cover; object-position:top; flex-shrink:0; }
    .pnl-name { font-size:12px; font-weight:600; color:var(--text); flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .pnl-date { font-size:11px; color:rgba(255,255,255,0.4); flex-shrink:0; min-width:48px; text-align:right; }
    .pnl-current { font-size:12px; font-weight:600; color:rgba(255,255,255,0.65); flex-shrink:0; min-width:64px; text-align:right; }
    .pnl-pct { font-size:12px; font-weight:800; flex-shrink:0; min-width:56px; text-align:right; }
    .pnl-eur { font-size:12px; font-weight:600; color:var(--text); flex-shrink:0; min-width:70px; text-align:right; }
    .pnl-pct.pos { color:var(--green); } .pnl-pct.neg { color:var(--red); }
    .pnl-divider { height:1px; background:var(--border); margin:4px 20px; }
    @media (max-width:640px){ .pnl-date { display:none; } }
    /* SIMPLE BREAKDOWN (Total Value / Total Invested) */
    .simple-row { display:flex; align-items:center; gap:10px; padding:8px 20px; transition:background 0.1s; }
    .simple-row:hover { background:rgba(20,20,20,0.85); }
    .simple-img { width:32px; height:32px; border-radius:4px; object-fit:cover; object-position:top; flex-shrink:0; }
    .simple-name { font-size:12px; font-weight:600; color:var(--text); flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .simple-price { font-size:12px; font-weight:700; color:var(--text); flex-shrink:0; min-width:70px; text-align:right; }
    .simple-price.free { color:rgba(255,255,255,0.35); font-weight:600; }

    /* WATCHLIST STRIP */
    .wl-strip { margin-bottom:28px; background:rgba(20,20,20,0.78); border:1px solid rgba(184,145,46,0.29); border-radius:var(--radius); padding:12px 16px; backdrop-filter:blur(20px); box-shadow:0 6px 24px rgba(0,0,0,0.55),0 0 0 1px rgba(255,255,255,0.04),inset 0 1px 0 rgba(255,255,255,0.06); }
    .wl-strip-label { font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:rgba(255,255,255,0.7); font-weight:700; margin-bottom:10px; }
    .wl-carousel-wrap { overflow-x:auto; overflow-y:hidden; height:130px; cursor:grab; -webkit-overflow-scrolling:touch; scrollbar-width:none; -ms-overflow-style:none; }
    .wl-carousel-wrap::-webkit-scrollbar { display:none; }
    .wl-carousel-wrap:active { cursor:grabbing; }
    .wl-carousel-inner { display:flex; gap:12px; }
    .wl-img-slide { flex:0 0 auto; width:80px; display:flex; flex-direction:column; align-items:center; gap:4px; text-decoration:none; cursor:pointer; padding:4px; border-radius:8px; transition:transform 0.18s, box-shadow 0.18s, background 0.18s; }
    .wl-img-slide:hover { transform:scale(1.08); background:rgba(184,145,46,0.10); box-shadow:0 0 18px rgba(184,145,46,0.35); }
    .wl-img-slide img { width:80px; height:80px; border-radius:5px; object-fit:cover; display:block; pointer-events:none; }
    .wl-slide-price { font-size:11px; font-weight:700; color:var(--text); white-space:nowrap; }
    .wl-slide-pct { font-size:10px; font-weight:700; white-space:nowrap; display:flex; align-items:center; gap:2px; }
    .wl-slide-pct.pos { color:var(--green); } .wl-slide-pct.neg { color:var(--red); } .wl-slide-pct.neu { color:var(--text-muted); }
    .wl-slide-name { font-size:9px; color:var(--text-muted); text-align:center; width:80px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }

    /* MONTHLY INVESTMENT ACCORDION */
    .month-panel { background:rgba(20,20,20,0.78); border:1px solid rgba(184,145,46,0.29); border-radius:var(--radius); padding:10px; backdrop-filter:blur(20px); box-shadow:0 6px 24px rgba(0,0,0,0.55),0 0 0 1px rgba(255,255,255,0.04),inset 0 1px 0 rgba(255,255,255,0.06); }
    .month-row { border-radius:8px; overflow:hidden; }
    .month-row + .month-row { margin-top:4px; }
    .month-row-head { display:flex; align-items:center; gap:10px; padding:11px 12px; cursor:pointer; border-radius:8px; background:rgba(255,255,255,0.02); transition:background 0.15s; }
    .month-row-head:hover { background:rgba(184,145,46,0.09); }
    .month-toggle-icon { font-size:10px; color:var(--gold); transition:transform 0.2s ease; width:10px; flex-shrink:0; display:inline-block; }
    .month-row.open .month-toggle-icon { transform:rotate(90deg); }
    .month-label { font-size:13px; font-weight:700; color:var(--text); flex:0 0 130px; }
    .month-count { font-size:11px; color:var(--text-muted); flex:1; }
    .month-total { font-size:14px; font-weight:800; color:var(--text); flex-shrink:0; }
    .month-cap-flag { font-size:12px; flex-shrink:0; margin-left:2px; cursor:help; }
    .month-detail { max-height:0; overflow:hidden; transition:max-height 0.28s ease; }
    .month-row.open .month-detail { max-height:1400px; }
    .month-card-row { display:flex; align-items:center; gap:10px; padding:7px 12px 7px 32px; }
    .month-card-row:hover { background:rgba(255,255,255,0.03); }
    .month-card-img { width:26px; height:26px; border-radius:4px; object-fit:cover; object-position:top; flex-shrink:0; }
    .month-card-name { font-size:12px; font-weight:600; color:var(--text); flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .month-card-date { font-size:11px; color:rgba(255,255,255,0.4); flex-shrink:0; min-width:46px; text-align:right; }
    .month-card-buy { font-size:12px; font-weight:600; color:rgba(255,255,255,0.65); flex-shrink:0; min-width:62px; text-align:right; }
    .month-card-buy.free { color:rgba(255,255,255,0.35); }
    .month-card-current { font-size:12px; font-weight:600; color:var(--text); flex-shrink:0; min-width:62px; text-align:right; }
    .month-card-pct { font-size:12px; font-weight:800; flex-shrink:0; min-width:56px; text-align:right; color:var(--text-muted); }
    .month-card-pct.pos { color:var(--green); } .month-card-pct.neg { color:var(--red); }
    @media (max-width:640px){ .month-card-date{display:none;} .month-label{flex-basis:96px;} }

    /* FILTERS */
    .section-wrap { margin-bottom:32px; }
    .section-header { display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
    .section-header h2 { font-size:18px; font-weight:800; letter-spacing:-0.3px; color:#f2f2f2; }
    .section-count { font-size:11px; color:var(--text-muted); background:rgba(20,20,20,0.75); border:1px solid rgba(184,145,46,0.19); padding:2px 8px; border-radius:20px; }
    .section-header::after { content:''; flex:1; height:1px; background:rgba(184,145,46,0.32); min-width:20px; }
    .filter-group { display:flex; gap:4px; margin-left:auto; order:3; }
    .filter-btn { font-size:11px; font-weight:600; padding:4px 10px; border-radius:6px; border:1px solid rgba(184,145,46,0.19); background:rgba(10,10,10,0.55); color:var(--text-muted); cursor:pointer; transition:all 0.15s; white-space:nowrap; }
    .filter-btn:hover { color:var(--text); border-color:rgba(184,145,46,0.56); background:rgba(20,20,20,0.75); }
    .filter-btn.active { background:var(--orange); border-color:var(--orange); color:#fff; }

    /* GRID */
    .card-grid { display:grid; grid-template-columns:repeat(5,1fr); column-gap:4vw; row-gap:14px; padding:0 4vw; }

    /* CARD */
    .card { background:linear-gradient(145deg,#262626 0%,#1a1a1a 50%,#0f0f0f 100%); border:1px solid rgba(184,145,46,0.35); border-radius:var(--radius); overflow:hidden; cursor:pointer; display:flex; flex-direction:column; transition:border-color 0.25s,box-shadow 0.3s; will-change:transform; position:relative;
      box-shadow:var(--card-glow); }
    .card:hover { border-color:rgba(184,145,46,0.65); }
    /* Gloss overlay */
    .card-gloss { position:absolute; inset:0; opacity:0; pointer-events:none; z-index:5; transition:opacity 0.3s; }
    /* Shimmer ring dorado en hover */
    .card::after { content:''; position:absolute; inset:-1px; border-radius:calc(var(--radius)+1px); pointer-events:none; z-index:10; transition:box-shadow 0.35s; }
    .card:hover::after { box-shadow:0 0 28px 4px rgba(184,145,46,0.35),0 0 60px 8px rgba(140,100,30,0.08),inset 0 0 16px rgba(184,145,46,0.16); }
    .pill { position:absolute; bottom:8px; right:8px; font-size:11px; font-weight:700; padding:3px 8px; border-radius:20px; line-height:1.3; white-space:nowrap; backdrop-filter:blur(6px); }
    .pill.pos { background:rgba(61,220,132,0.18); color:var(--green); border:1px solid rgba(61,220,132,0.3); }
    .pill.neg { background:rgba(255,90,90,0.18); color:var(--red); border:1px solid rgba(255,90,90,0.3); }
    .pill.neu { background:rgba(28,28,28,0.65); color:var(--text-muted); border:1px solid var(--border); }
    .card-cover { width:100%; aspect-ratio:5/7; overflow:hidden; background:#050505; position:relative; flex-shrink:0; }
    .card-cover img { width:100%; height:100%; object-fit:contain; display:block; }
    .card-body { padding:10px 11px 12px; display:flex; flex-direction:column; gap:5px; }
    .card-name { font-size:14px; font-weight:700; line-height:1.3; color:var(--text); }
    .card-badge-row { display:flex; gap:3px; flex-wrap:wrap; }
    .badge { font-size:8px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; padding:3px 7px; border-radius:4px; }
    .badge-origins      { background:rgba(80,120,255,0.9); color:#fff; }
    .badge-unleashed    { background:rgba(220,70,70,0.9); color:#fff; }
    .badge-spiritforged { background:rgba(50,180,100,0.9); color:#fff; }
    .badge-proving      { background:rgba(212,166,53,0.9); color:#000; }
    .badge-sealed-tag   { background:rgba(80,200,255,0.9); color:#000; }
    .card-price-block { display:flex; flex-direction:column; gap:4px; margin-top:5px; }
    .card-price-row { display:flex; align-items:baseline; gap:6px; }
    .card-price-label { font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); font-weight:600; min-width:76px; flex-shrink:0; }
    .card-price-buy { font-size:13px; font-weight:600; color:var(--text); }
    .card-price-main { font-size:18px; font-weight:800; color:#d9b04a; letter-spacing:-0.3px; line-height:1.15; display:inline-flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .card-var-inline { font-size:12px; font-weight:700; display:inline-flex; align-items:center; gap:2px; }
    .var-arrow { font-size:9px; }
    .cv-pos { color:var(--green); } .cv-neg { color:var(--red); } .cv-neu { color:var(--text-muted); }

    /* MODAL */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); backdrop-filter:blur(12px); z-index:100; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; animation:overlay-in 0.2s ease both; }
    @keyframes overlay-in { from{opacity:0;} to{opacity:1;} }
    .modal { background:linear-gradient(160deg,#1a1a1a 0%,#0a0a0a 50%,#000000 100%); border:1px solid rgba(184,145,46,0.29); border-radius:18px; width:440px; max-width:95vw; max-height:92vh; overflow-y:auto; overflow-x:hidden; position:relative; box-shadow:0 36px 90px rgba(0,0,0,0.98),0 0 0 1px rgba(184,145,46,0.16),0 0 80px rgba(184,145,46,0.16); animation:modal-in 0.32s cubic-bezier(0.34,1.4,0.64,1) both; }
    @keyframes modal-in { from{opacity:0;transform:scale(0.86) translateY(28px);} to{opacity:1;transform:scale(1) translateY(0);} }
    .modal-close-x { position:fixed; top:16px; right:16px; width:30px; height:30px; border-radius:50%; background:rgba(10,10,10,0.9); border:1px solid rgba(255,255,255,0.1); cursor:pointer; color:var(--text-muted); font-size:13px; display:flex; align-items:center; justify-content:center; z-index:10; transition:color 0.15s,border-color 0.15s; }
    .modal-close-x:hover { color:var(--text); border-color:rgba(255,255,255,0.25); }

    /* Stage: área de imagen de la carta con efecto 3D */
    .modal-stage { display:flex; justify-content:center; align-items:center; padding:32px 20px 20px; perspective:900px; background:radial-gradient(ellipse at 50% 60%, rgba(216,180,100,0.11) 0%, transparent 70%); cursor:crosshair; flex-shrink:0; }
    .modal-card-3d { position:relative; width:190px; border-radius:11px; overflow:hidden; transform-style:preserve-3d;
      box-shadow:0 24px 60px rgba(0,0,0,0.9),0 8px 20px rgba(0,0,0,0.6),0 0 40px rgba(216,180,100,0.27),0 0 0 1px rgba(255,255,255,0.08); transition:box-shadow 0.3s; }
    .modal-card-3d:hover { box-shadow:0 28px 70px rgba(0,0,0,0.9),0 10px 24px rgba(0,0,0,0.6),0 0 55px rgba(216,180,100,0.42),0 0 0 1px rgba(255,255,255,0.12); }
    #modal-img { width:100%; height:auto; display:block; }
    .modal-card-gloss { position:absolute; inset:0; opacity:0; pointer-events:none; border-radius:11px; transition:opacity 0.2s; }
    .modal-card-shine { position:absolute; inset:0; pointer-events:none; border-radius:11px; background:linear-gradient(135deg,rgba(255,255,255,0.1) 0%,transparent 55%,rgba(216,180,100,0.09) 100%); mix-blend-mode:screen; }

    /* Info debajo de la carta */
    .modal-body { padding:4px 22px 24px; }
    .modal-badges { display:flex; gap:5px; margin-bottom:6px; }
    .modal-name { font-size:17px; font-weight:800; letter-spacing:-0.4px; line-height:1.25; margin-bottom:14px; }
    .modal-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:rgba(184,145,46,0.19); border:1px solid rgba(184,145,46,0.24); border-radius:10px; overflow:hidden; margin-bottom:16px; }
    .modal-stat { display:flex; flex-direction:column; gap:3px; padding:12px 14px; background:rgba(10,10,10,0.85); }
    .modal-stat-label { font-size:9px; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-muted); font-weight:700; }
    .modal-stat-value { font-size:18px; font-weight:800; letter-spacing:-0.5px; }
    .modal-stat-value.pos { color:var(--green); } .modal-stat-value.neg { color:var(--red); }
    .modal-stat-sub { font-size:10px; color:var(--text-muted); font-weight:600; }
    .modal-stat-sub.pos { color:var(--green); } .modal-stat-sub.neg { color:var(--red); }

    /* Gráfica interactiva */
    .modal-chart-section { margin-bottom:16px; }
    .modal-spark-label { font-size:9px; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-muted); font-weight:700; display:block; margin-bottom:8px; }
    .chart-wrap { position:relative; width:100%; height:88px; }

    .modal-spark-empty { width:100%; height:88px; border:1px dashed rgba(184,145,46,0.24); border-radius:6px; display:flex; align-items:center; justify-content:center; margin-bottom:0; }

    .btn-close:hover { border-color:rgba(255,255,255,0.2); color:var(--text); }

    @media (max-width:1100px) { .card-grid { grid-template-columns:repeat(4,1fr); column-gap:3.5vw; padding:0 3.5vw; } .summary-box { grid-template-columns:repeat(2,1fr); } }

<script src="data.js"></script>
<script>
(function(){
  const fmt     = n => n.toLocaleString('de-DE',{minimumFractionDigits:0,maximumFractionDigits:0})+' €';
  const fmtSign = n => (n>=0?'+':'')+fmt(n);
  const fmtPct  = n => (n>=0?'+':'')+n.toFixed(1)+'%';
  const badgeClass = s => ({Origins:'badge-origins',Unleashed:'badge-unleashed',Spiritforged:'badge-spiritforged','Proving Grounds':'badge-proving'}[s]||'');
  const cmUrl = item => item.cardmarketUrl || 'https://www.cardmarket.com/en/Riftbound/Products/Search?searchString='+encodeURIComponent(item.name);

  function drawSpark(id,history,h,interactive){
    const canvas=document.getElementById(id); if(!canvas)return;
    const ctx=canvas.getContext('2d'),dpr=window.devicePixelRatio||1;
    const W=canvas.offsetWidth*dpr,H=(h||canvas.offsetHeight)*dpr;
    canvas.width=W;canvas.height=H;
    const prices=history.map(x=>x.price),dates=history.map(x=>x.date);
    const mn=Math.min(...prices),mx=Math.max(...prices),rng=mx-mn||1;
    const pad=6*dpr,xp=i=>pad+(i/(prices.length-1))*(W-pad*2),yp=v=>H-pad-((v-mn)/rng)*(H-pad*2);
    const up=prices[prices.length-1]>=prices[0],col=up?'#3ddc84':'#ff5a5a';

    function render(hlIdx){
      ctx.clearRect(0,0,W,H);
      const grad=ctx.createLinearGradient(0,0,0,H);
      grad.addColorStop(0,up?'rgba(61,220,132,0.25)':'rgba(255,90,90,0.25)');grad.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath();prices.forEach((p,i)=>i===0?ctx.moveTo(xp(i),yp(p)):ctx.lineTo(xp(i),yp(p)));
      ctx.lineTo(xp(prices.length-1),H);ctx.lineTo(xp(0),H);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
      ctx.beginPath();prices.forEach((p,i)=>i===0?ctx.moveTo(xp(i),yp(p)):ctx.lineTo(xp(i),yp(p)));
      ctx.strokeStyle=col;ctx.lineWidth=2*dpr;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();
      ctx.beginPath();ctx.arc(xp(prices.length-1),yp(prices[prices.length-1]),3*dpr,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();

      if(hlIdx!==undefined){
        const hx=xp(hlIdx),hy=yp(prices[hlIdx]);
        ctx.save();ctx.beginPath();ctx.moveTo(hx,0);ctx.lineTo(hx,H);
        ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=1*dpr;ctx.setLineDash([4*dpr,4*dpr]);ctx.stroke();ctx.restore();
        ctx.beginPath();ctx.arc(hx,hy,6*dpr,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.18)';ctx.fill();
        ctx.beginPath();ctx.arc(hx,hy,3.5*dpr,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
        ctx.beginPath();ctx.arc(hx,hy,2.2*dpr,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
      }
    }
    render();

    if(interactive&&prices.length>1){
      const tip=document.getElementById('chart-tip');
      if(canvas._mv)canvas.removeEventListener('mousemove',canvas._mv);
      if(canvas._ml)canvas.removeEventListener('mouseleave',canvas._ml);
      canvas._mv=e=>{
        const r=canvas.getBoundingClientRect(),rx=(e.clientX-r.left)*dpr;
        let best=0,bd=Infinity;prices.forEach((_,i)=>{const d=Math.abs(xp(i)-rx);if(d<bd){bd=d;best=i;}});
        render(best);
        if(tip){
          const pf=prices[best].toLocaleString('de-DE',{minimumFractionDigits:0,maximumFractionDigits:0})+' €';
          const df=new Date(dates[best]+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
          tip.textContent=df+'  ·  '+pf;
          tip.style.display='block';
          const relX=e.clientX-r.left,cw=r.width;
          if(relX>cw/2){tip.style.right=(cw-relX+10)+'px';tip.style.left='auto';}
          else{tip.style.left=(relX+10)+'px';tip.style.right='auto';}
        }
      };
      canvas._ml=()=>{render();if(tip)tip.style.display='none';};
      canvas.addEventListener('mousemove',canvas._mv);
      canvas.addEventListener('mouseleave',canvas._ml);
    }
  }

  function openModal(item){
    const isWatchlist=item.status==='Watchlist';
    const isFree=!isWatchlist&&(!item.buyPrice||item.buyPrice===0),qty=item.qty||1;
    const pnl=(isFree||isWatchlist)?null:(item.currentPrice-item.buyPrice)*qty;
    const pct=(isFree||isWatchlist)?null:(item.currentPrice-item.buyPrice)/item.buyPrice*100;
    document.getElementById('modal-img').src=item.image;
    document.getElementById('modal-name').textContent=item.name;
    document.getElementById('modal-cost').textContent=isWatchlist?'—':(isFree?'Free':fmt(item.buyPrice*qty));
    document.getElementById('modal-market').textContent=fmt(item.currentPrice*qty);
    const pnlEl=document.getElementById('modal-pnl');
    pnlEl.textContent=pnl!==null?fmtSign(pnl):'—';pnlEl.className='modal-stat-value'+(pnl===null?'':pnl>=0?' pos':' neg');
    const pctEl=document.getElementById('modal-pct');
    pctEl.textContent=pct!==null?fmtPct(pct)+' on cost':'';
    pctEl.className='modal-stat-sub'+(pct===null?'':pct>=0?' pos':' neg');
    document.getElementById('modal-badges').innerHTML=
      (item.set?`<span class="badge ${badgeClass(item.set)}">${item.set}</span>`:'')+
      (item.condition==='Sealed'?`<span class="badge badge-sealed-tag">Sealed</span>`:'');
    document.getElementById('modal-cm-link').href=cmUrl(item);
    const cw=document.getElementById('chart-wrap'),se=document.getElementById('modal-spark-empty');
    if(item.priceHistory?.length>1){
      cw.style.display='block';se.style.display='none';
      requestAnimationFrame(()=>drawSpark('modal-spark',item.priceHistory,88,true));
    } else { cw.style.display='none';se.style.display='flex'; }
    document.getElementById('modal-overlay').classList.add('open');
    document.body.style.overflow='hidden';
    // Tilt 3D en la carta del modal
    initModalTilt();
  }
  function closeModal(){
    const ov=document.getElementById('modal-overlay');
    ov.classList.remove('open');
    document.body.style.overflow='';
    if(ov._stopTilt){ov._stopTilt();ov._stopTilt=null;}
  }
  function initModalTilt(){
    const stage=document.getElementById('modal-stage');
    const card3d=document.getElementById('modal-card-3d');
    const gloss=document.getElementById('modal-card-gloss');
    if(!stage||!card3d)return;
    let tx=0,ty=0,tgtX=0,tgtY=0,gx=50,gy=50,hov=false;
    function onMove(e){
      hov=true;
      const r=card3d.getBoundingClientRect();
      const mx=(e.clientX-r.left-r.width/2)/(r.width/2);
      const my=(e.clientY-r.top-r.height/2)/(r.height/2);
      tgtX=-my*14;tgtY=mx*14;
      gx=((e.clientX-r.left)/r.width)*100;
      gy=((e.clientY-r.top)/r.height)*100;
      if(gloss)gloss.style.opacity='1';
    }
    function onLeave(){hov=false;tgtX=0;tgtY=0;if(gloss)gloss.style.opacity='0';}
    stage.addEventListener('mousemove',onMove);
    stage.addEventListener('mouseleave',onLeave);
    let raf;
    function tick(){
      tx+=(tgtX-tx)*0.1;ty+=(tgtY-ty)*0.1;
      if(Math.abs(tx)>0.01||Math.abs(ty)>0.01||hov){
        card3d.style.transform=`perspective(900px) rotateX(${tx.toFixed(2)}deg) rotateY(${ty.toFixed(2)}deg)`;
      }
      if(gloss&&hov){
        gloss.style.background=`radial-gradient(circle at ${gx.toFixed(0)}% ${gy.toFixed(0)}%,rgba(255,255,200,0.28) 0%,rgba(255,255,255,0.07) 40%,transparent 65%)`;
      }
      raf=requestAnimationFrame(tick);
    }
    raf=requestAnimationFrame(tick);
    const ov=document.getElementById('modal-overlay');
    ov._stopTilt=()=>{
      stage.removeEventListener('mousemove',onMove);
      stage.removeEventListener('mouseleave',onLeave);
      cancelAnimationFrame(raf);
      if(card3d)card3d.style.transform='';
    };
  }
  document.getElementById('modal-close-x').addEventListener('click',closeModal);
  document.getElementById('modal-close-btn').addEventListener('click',closeModal);
  document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target.id==='modal-overlay')closeModal();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

  function sortItems(items, mode) {
    if (mode === 'gainers') {
      return [...items].sort((a,b) => {
        const pctA = a.buyPrice>0 ? (a.currentPrice-a.buyPrice)/a.buyPrice : -Infinity;
        const pctB = b.buyPrice>0 ? (b.currentPrice-b.buyPrice)/b.buyPrice : -Infinity;
        return pctB - pctA;
      });
    }
    return [...items].sort((a,b) => b.currentPrice - a.currentPrice);
  }

  function buildCard(item){
    const isFree=!item.buyPrice||item.buyPrice===0,qty=item.qty||1;
    const pnl=isFree?null:(item.currentPrice-item.buyPrice)*qty;
    const pct=isFree?null:(item.currentPrice-item.buyPrice)/item.buyPrice*100;
    const isPos=pnl!==null&&pnl>=0;
    const pillCls=pnl===null?'neu':isPos?'pos':'neg';
    const pillTxt=pct!==null?((pct>=0?'+':'')+pct.toFixed(1)+'%'):'—';
    const varCls=pnl===null?'cv-neu':isPos?'cv-pos':'cv-neg';
    const varArrow=isPos?'▲':pnl!==null?'▼':'';
    const varTxt=pct!==null?((pct>=0?'+':'')+pct.toFixed(1)+'%'):'';
    return `<div class="card" data-id="${item.id}">
      <div class="card-cover">
        <img src="${item.image}" alt="${item.name}" loading="lazy" onerror="this.style.opacity='0.08'"/>
        <span class="pill ${pillCls}">${pillTxt}</span>
        <div class="card-gloss"></div>
      </div>
      <div class="card-body">
        <div class="card-badge-row">
          ${item.set?`<span class="badge ${badgeClass(item.set)}">${item.set}</span>`:''}
          ${item.condition==='Sealed'?`<span class="badge badge-sealed-tag">Sealed</span>`:''}
        </div>
        <div class="card-name">${item.name}</div>
        <div class="card-price-block">
          <div class="card-price-row"><span class="card-price-label">Buy Price</span><span class="card-price-buy">${isFree?'Free':fmt(item.buyPrice*qty)}</span></div>
          <div class="card-price-row"><span class="card-price-label">Current Price</span>
            <span class="card-price-main">${fmt(item.currentPrice*qty)}${varTxt?`<span class="${varCls} card-var-inline"><span class="var-arrow">${varArrow}</span>${varTxt}</span>`:''}</span>
          </div>
        </div>
      </div>
    </div>`;
  }

  let allCards = [];
  let singlesSort = 'gainers', sealedSort = 'gainers';

  function renderGrid(items, gridId, sort) {
    document.getElementById(gridId).innerHTML = sortItems(items, sort).map(buildCard).join('');
    document.querySelectorAll(`#${gridId} .card`).forEach(el => {
      el.addEventListener('click', () => { const item = allCards.find(c=>c.id===el.dataset.id); if(item)openModal(item); });
    });
  }

  // Watchlist carousel with manual scroll
  function initWatchlist(cards){
    const wl=(cards||[]).filter(c=>c.status==='Watchlist' && c.image).sort((a,b)=>a.currentPrice-b.currentPrice);
    const inner=document.getElementById('wl-inner');
    const wrap=document.getElementById('wl-carousel');
    if(!wl.length){inner.innerHTML='<div style="color:var(--text-muted);font-size:12px;padding:4px 0;">No watchlist items yet</div>';return;}

    function varFromHistory7(h){
      if(!h||h.length<2)return null;
      const last=h[h.length-1],cutoff=new Date(last.date+'T12:00:00');
      cutoff.setDate(cutoff.getDate()-7);
      const cands=h.slice(0,-1).filter(x=>new Date(x.date+'T12:00:00')<=cutoff);
      if(!cands.length)return null;
      return(last.price-cands[cands.length-1].price)/cands[cands.length-1].price*100;
    }

    function buildSlide(item){
      const p7=varFromHistory7(item.priceHistory);
      const cls=p7===null?'neu':p7>=0?'pos':'neg';
      const arrow=p7===null?'':p7>=0?'▲':'▼';
      const pctTxt=p7===null?'—':(p7>=0?'+':'')+p7.toFixed(1)+'% 7d';
      const price=item.currentPrice?item.currentPrice.toLocaleString('de-DE',{minimumFractionDigits:0})+' €':'—';
      return `<div class="wl-img-slide" data-id="${item.id}" draggable="false" title="${item.name}">
        <img src="${item.image}" alt="${item.name}" draggable="false" onerror="this.style.opacity=0.15"/>
        <div class="wl-slide-price">${price}</div>
        <div class="wl-slide-pct ${cls}"><span>${arrow}</span>${pctTxt}</div>
        <div class="wl-slide-name">${item.name}</div>
      </div>`;
    }

    inner.innerHTML=[...wl,...wl,...wl].map(buildSlide).join('');

    const SW=92, setW=wl.length*SW;
    let dragging=false, dragX=0, dragStart=0, hovering=false, prevT=null, wasDragged=false;

    wrap.scrollLeft = setW;

    function wrapScroll(){
      if(wrap.scrollLeft<=0) wrap.scrollLeft += setW;
      else if(wrap.scrollLeft>=setW*2) wrap.scrollLeft -= setW;
    }

    requestAnimationFrame(function tick(t){
      if(!dragging && !hovering){
        if(prevT!==null) wrap.scrollLeft += 40*(t-prevT)/1000;
        prevT=t;
        wrapScroll();
      } else {
        prevT=t;
      }
      requestAnimationFrame(tick);
    });

    // Pausa el auto-scroll al pasar el raton por encima
    wrap.addEventListener('mouseenter', ()=>{ hovering=true; });
    wrap.addEventListener('mouseleave', ()=>{ hovering=false; });

    // Arrastre manual con el raton (ademas del gesto nativo de 2 dedos, que ya funciona solo)
    wrap.addEventListener('mousedown', e=>{
      dragging=true; wasDragged=false; dragX=e.clientX; dragStart=wrap.scrollLeft;
      wrap.style.cursor='grabbing';
    });
    window.addEventListener('mousemove', e=>{
      if(dragging){
        if(Math.abs(e.clientX-dragX)>4) wasDragged=true;
        wrap.scrollLeft = dragStart - (e.clientX-dragX); wrapScroll();
      }
    });
    window.addEventListener('mouseup', ()=>{
      if(dragging){ dragging=false; wrap.style.cursor='grab'; }
    });
    // Reajusta el bucle infinito tambien cuando el usuario hace scroll nativo (trackpad/rueda)
    wrap.addEventListener('scroll', wrapScroll, {passive:true});

    // Click en una carta abre la vista extendida (si no fue el final de un arrastre)
    inner.addEventListener('click', e=>{
      if(wasDragged){ wasDragged=false; return; }
      const el=e.target.closest('.wl-img-slide');
      if(!el) return;
      const item=allCards.find(c=>c.id===el.dataset.id);
      if(item) openModal(item);
    });
  }

  function monthLabel(key){
    const [y,m]=key.split('-').map(Number);
    return new Date(y,m-1,1).toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  }

  function renderMonthly(holding){
    const withDate=holding.filter(c=>c.buyDate);
    const groups={};
    withDate.forEach(c=>{
      const key=c.buyDate.slice(0,7);
      (groups[key]=groups[key]||[]).push(c);
    });
    const keys=Object.keys(groups).sort().reverse();
    const wrap=document.getElementById('month-accordion');
    document.getElementById('monthly-count').textContent=keys.length+(keys.length===1?' month':' months');

    wrap.innerHTML=keys.map(key=>{
      const items=groups[key].slice().sort((a,b)=>new Date(b.buyDate)-new Date(a.buyDate));
      const paidItems=items.filter(c=>c.buyPrice>0);
      const total=paidItems.reduce((s,c)=>s+c.buyPrice*(c.qty||1),0);
      const cappedTotal=paidItems.filter(c=>!c.excludeFromCap).reduce((s,c)=>s+c.buyPrice*(c.qty||1),0);
      const overCap=cappedTotal>500;

      const rows=items.map(c=>{
        const dateTxt=new Date(c.buyDate+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});
        const isFree=!c.buyPrice||c.buyPrice===0;
        const pct=isFree?null:(c.currentPrice-c.buyPrice)/c.buyPrice*100;
        const pos=pct!==null&&pct>=0;
        return `<div class="month-card-row">
          <img class="month-card-img" src="${c.image||''}" alt="${c.name}" onerror="this.style.opacity=0.1"/>
          <span class="month-card-name">${c.name}</span>
          <span class="month-card-date">${dateTxt}</span>
          <span class="month-card-buy ${isFree?'free':''}">${isFree?'Free':fmt(c.buyPrice)}</span>
          <span class="month-card-current">${fmt(c.currentPrice)}</span>
          <span class="month-card-pct ${pct===null?'':(pos?'pos':'neg')}">${pct===null?'—':(pos?'+':'')+pct.toFixed(1)+'%'}</span>
        </div>`;
      }).join('');

      return `<div class="month-row" data-month="${key}">
        <div class="month-row-head">
          <span class="month-toggle-icon">▸</span>
          <span class="month-label">${monthLabel(key)}</span>
          <span class="month-count">${items.length} ${items.length===1?'buy':'buys'}</span>
          <span class="month-total">${fmt(total)}</span>
          ${overCap?'<span class="month-cap-flag" title="Exceeds the €500 monthly cap">⚠️</span>':''}
        </div>
        <div class="month-detail">${rows}</div>
      </div>`;
    }).join('');

    wrap.querySelectorAll('.month-row-head').forEach(head=>{
      head.addEventListener('click',()=>{
        head.parentElement.classList.toggle('open');
      });
    });
  }

  function render(){
    if(!window.portfolioData?.cards)return;
    allCards=window.portfolioData.cards;
    const holding=allCards.filter(c=>c.status==='Holding');
    const singles=holding.filter(c=>c.condition!=='Sealed');
    const sealed=holding.filter(c=>c.condition==='Sealed');

    const totalValue=holding.reduce((s,c)=>s+c.currentPrice*(c.qty||1),0);
    const paid=holding.filter(c=>c.buyPrice>0);
    const totalInvested=paid.reduce((s,c)=>s+c.buyPrice*(c.qty||1),0);
    const paidMarket=paid.reduce((s,c)=>s+c.currentPrice*(c.qty||1),0);
    const pnl=paidMarket-totalInvested;
    const pct=totalInvested>0?pnl/totalInvested*100:0;

    document.getElementById('s-invested').textContent=fmt(totalInvested);
    document.getElementById('s-market').textContent=fmt(totalInvested);
    const pnlEl=document.getElementById('s-pnl');
    pnlEl.textContent=fmtSign(pnl);pnlEl.className='sm-value '+(pnl>=0?'pos':'neg');
    document.getElementById('s-total').textContent=fmt(totalValue);
    const pctEl=document.getElementById('s-pct');
    pctEl.textContent=fmtPct(pct)+' on cost';pctEl.className='sm-sub '+(pnl>=0?'pos':'neg');

    const upd=window.portfolioData.updatedAt;
    if(upd)document.getElementById('updated-label').textContent='Updated '+new Date(upd+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});

    renderGrid(singles,'singles-grid',singlesSort);
    renderGrid(sealed,'sealed-grid',sealedSort);
    document.getElementById('singles-count').textContent=singles.length+' items';
    document.getElementById('sealed-count').textContent=sealed.length+' items';
    if(!singles.length)document.getElementById('singles-section').style.display='none';
    if(!sealed.length)document.getElementById('sealed-section').style.display='none';

    initWatchlist(allCards);
    renderMonthly(holding);

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const target=btn.dataset.target,sort=btn.dataset.sort;
        document.querySelectorAll(`.filter-btn[data-target="${target}"]`).forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        if(target==='singles'){singlesSort=sort;renderGrid(singles,'singles-grid',sort);}
        else{sealedSort=sort;renderGrid(sealed,'sealed-grid',sort);}
        initCardEffects();
      });
    });

    // ── P&L BREAKDOWN MODAL ──
    document.getElementById('pnl-metric').addEventListener('click', () => {
      const paid = holding.filter(c => c.buyPrice > 0);
      const rows = paid.map(c => {
        const qty = c.qty || 1;
        const pnlEur = (c.currentPrice - c.buyPrice) * qty;
        const pnlPct = (c.currentPrice - c.buyPrice) / c.buyPrice * 100;
        return { ...c, pnlEur, pnlPct };
      }).sort((a, b) => b.pnlPct - a.pnlPct);

      const totalPnl = rows.reduce((s, c) => s + c.pnlEur, 0);
      const totalInv = paid.reduce((s, c) => s + c.buyPrice * (c.qty||1), 0);
      const totalPct = totalInv > 0 ? totalPnl / totalInv * 100 : 0;

      const pnlEl = document.getElementById('pnl-total-val');
      const pctEl = document.getElementById('pnl-total-pct');
      pnlEl.textContent = fmtSign(totalPnl);
      pnlEl.style.color = totalPnl >= 0 ? 'var(--green)' : 'var(--red)';
      pctEl.textContent = fmtPct(totalPct) + ' on cost';
      pctEl.style.color = totalPnl >= 0 ? 'var(--green)' : 'var(--red)';

      // Separar gainers y losers
      const gainers = rows.filter(r => r.pnlEur >= 0);
      const losers  = rows.filter(r => r.pnlEur < 0);

      function rowHTML(r, i) {
        const pos = r.pnlEur >= 0;
        const sign = pos ? '+' : '';
        const dateTxt = r.buyDate ? new Date(r.buyDate+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'}) : '—';
        return `<div class="pnl-row">
          <span class="pnl-rank">${i + 1}</span>
          <img class="pnl-img" src="${r.image}" alt="${r.name}" onerror="this.style.opacity=0.1"/>
          <span class="pnl-name">${r.name}</span>
          <span class="pnl-date">${dateTxt}</span>
          <span class="pnl-current">${fmt(r.currentPrice)}</span>
          <span class="pnl-pct ${pos ? 'pos' : 'neg'}">${sign}${r.pnlPct.toFixed(1)}%</span>
          <span class="pnl-eur">${sign}${fmt(Math.abs(r.pnlEur))}</span>
        </div>`;
      }

      let html = gainers.map((r, i) => rowHTML(r, i)).join('');
      if (gainers.length && losers.length) html += '<div class="pnl-divider"></div>';
      html += losers.map((r, i) => rowHTML(r, i)).join('');

      document.getElementById('pnl-list').innerHTML = html;
      document.getElementById('pnl-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    });

    document.getElementById('pnl-close').addEventListener('click', () => {
      document.getElementById('pnl-overlay').classList.remove('open');
      document.body.style.overflow = '';
    });
    document.getElementById('pnl-overlay').addEventListener('click', e => {
      if (e.target.id === 'pnl-overlay') {
        document.getElementById('pnl-overlay').classList.remove('open');
        document.body.style.overflow = '';
      }
    });

    // ── TOTAL VALUE BREAKDOWN MODAL (solo precios, sin tendencias) ──
    document.getElementById('total-metric').addEventListener('click', () => {
      const rows = holding.map(c => ({ ...c, lineValue: c.currentPrice * (c.qty || 1) }))
        .sort((a, b) => b.lineValue - a.lineValue);
      document.getElementById('total-total-val').textContent = fmt(totalValue);
      document.getElementById('total-list').innerHTML = rows.map(r => `<div class="simple-row">
          <img class="simple-img" src="${r.image}" alt="${r.name}" onerror="this.style.opacity=0.1"/>
          <span class="simple-name">${r.name}</span>
          <span class="simple-price">${fmt(r.lineValue)}</span>
        </div>`).join('');
      document.getElementById('total-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    });
    document.getElementById('total-close').addEventListener('click', () => {
      document.getElementById('total-overlay').classList.remove('open');
      document.body.style.overflow = '';
    });
    document.getElementById('total-overlay').addEventListener('click', e => {
      if (e.target.id === 'total-overlay') {
        document.getElementById('total-overlay').classList.remove('open');
        document.body.style.overflow = '';
      }
    });

    // ── TOTAL INVESTED BREAKDOWN MODAL (precios de compra, incluye free) ──
    document.getElementById('invested-metric').addEventListener('click', () => {
      const rows = holding.map(c => ({ ...c, lineCost: c.buyPrice * (c.qty || 1) }))
        .sort((a, b) => b.lineCost - a.lineCost);
      document.getElementById('invested-total-val').textContent = fmt(totalInvested);
      document.getElementById('invested-list').innerHTML = rows.map(r => `<div class="simple-row">
          <img class="simple-img" src="${r.image}" alt="${r.name}" onerror="this.style.opacity=0.1"/>
          <span class="simple-name">${r.name}</span>
          <span class="simple-price ${r.buyPrice === 0 ? 'free' : ''}">${r.buyPrice === 0 ? 'Gratis' : fmt(r.lineCost)}</span>
        </div>`).join('');
      document.getElementById('invested-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    });
    document.getElementById('invested-close').addEventListener('click', () => {
      document.getElementById('invested-overlay').classList.remove('open');
      document.body.style.overflow = '';
    });
    document.getElementById('invested-overlay').addEventListener('click', e => {
      if (e.target.id === 'invested-overlay') {
        document.getElementById('invested-overlay').classList.remove('open');
        document.body.style.overflow = '';
      }
    });
  }

  render();

  // ── FLOATING + PARALLAX + 3D TILT + GLOSS (portfolio cards only) ──
  function initCardEffects() {
    const grids = ['singles-grid','sealed-grid'];
    const portfolioCards = [];
    grids.forEach(id => {
      const g = document.getElementById(id);
      if (g) portfolioCards.push(...g.querySelectorAll('.card'));
    });
    if (!portfolioCards.length) return;

    portfolioCards.forEach((card) => {
      card._tiltX = 0; card._tiltY = 0; card._tgtX = 0; card._tgtY = 0;
      card._hovered = false; card._glossX = 50; card._glossY = 50;
      card.style.position = 'relative';

      card.addEventListener('mouseenter', () => { card._hovered = true; });
      card.addEventListener('mousemove', e => {
        const r = card.getBoundingClientRect();
        card._tgtX = -((e.clientY - r.top  - r.height/2) / (r.height/2)) * 10.8;
        card._tgtY =  ((e.clientX - r.left - r.width /2) / (r.width /2)) * 10.8;
        card._glossX = ((e.clientX - r.left) / r.width)  * 100;
        card._glossY = ((e.clientY - r.top)  / r.height) * 100;
      });
      card.addEventListener('mouseleave', () => {
        card._hovered = false; card._tgtX = 0; card._tgtY = 0;
        const g = card.querySelector('.card-gloss');
        if (g) g.style.opacity = '0';
      });
    });

    // Parallax sólo en scroll
    let lastScroll = window.scrollY;
    const scrollShifts = new Map();
    function updateScrollShifts() {
      portfolioCards.forEach(card => {
        const rect = card.getBoundingClientRect();
        const vhC = window.innerHeight / 2;
        const cardC = rect.top + rect.height / 2;
        scrollShifts.set(card, ((cardC - vhC) / window.innerHeight) * 12);
      });
    }
    window.addEventListener('scroll', updateScrollShifts, {passive:true});
    updateScrollShifts();

    function tick() {
      portfolioCards.forEach(card => {
        const scrollY = scrollShifts.get(card) || 0;
        card._tiltX += (card._tgtX - card._tiltX) * 0.10;
        card._tiltY += (card._tgtY - card._tiltY) * 0.10;

        card.style.transform =
          `translateY(${scrollY.toFixed(2)}px) ` +
          `perspective(700px) ` +
          `rotateX(${card._tiltX.toFixed(2)}deg) ` +
          `rotateY(${card._tiltY.toFixed(2)}deg)`;

        // Sombra fija de profundidad + glow dorado en hover
        const glow = card._hovered ? ',0 0 32px 5px rgba(184,145,46,0.45),0 0 60px 10px rgba(184,145,46,0.13)' : '';
        card.style.boxShadow =
          `0 0 0 1px rgba(184,145,46,0.16),inset 0 1px 0 rgba(255,255,255,0.09),0 2px 0 rgba(0,0,0,0.95),0 8px 24px rgba(0,0,0,0.85),0 24px 60px rgba(0,0,0,0.9)${glow}`;

        if (card._hovered) {
          const g = card.querySelector('.card-gloss');
          if (g) {
            g.style.background = `radial-gradient(circle at ${card._glossX.toFixed(0)}% ${card._glossY.toFixed(0)}%,rgba(255,225,140,0.38) 0%,rgba(216,180,100,0.12) 40%,transparent 65%)`;
            g.style.opacity = '1';
          }
        }
      });
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }
  initCardEffects();

  document.querySelectorAll('a.nav-link:not(.active)').forEach(link=>{
    link.addEventListener('click',function(e){
      e.preventDefault();const href=this.href;
      document.querySelector('main').classList.add('leaving');
      setTimeout(()=>{window.location.href=href;},220);
    });
  });
})();
</script>
